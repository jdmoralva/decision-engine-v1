openapi: 3.1.0
info:
  title: Decision Engine Runtime API
  version: 0.1.0
  description: Contratos runtime del MVP para consulta, evaluacion, trace y solicitudes.
paths:
  /api/v1/loans/{productCode}/consultas:
    post:
      summary: Consult customer and available campaigns
      tags: [runtime]
      parameters:
        - in: path
          name: productCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanConsultationRequest'
      responses:
        '200':
          description: Consultation result
  /api/v1/loans/{productCode}/evaluaciones:
    post:
      summary: Execute product evaluation
      tags: [runtime]
      parameters:
        - in: path
          name: productCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductEvaluationRequest'
      responses:
        '201':
          description: Evaluation created
  /api/v1/loans/{productCode}/evaluaciones/{evaluationId}:
    get:
      summary: Get evaluation by id
      tags: [runtime]
      parameters:
        - in: path
          name: productCode
          required: true
          schema:
            type: string
        - in: path
          name: evaluationId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evaluation detail
  /api/v1/loans/{productCode}/evaluaciones/{evaluationId}/trace:
    get:
      summary: Get decision trace
      tags: [runtime]
      parameters:
        - in: path
          name: productCode
          required: true
          schema:
            type: string
        - in: path
          name: evaluationId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Decision trace detail
  /api/v1/credit-requests:
    post:
      summary: Create credit request
      tags: [runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreditRequestCreateRequest'
      responses:
        '201':
          description: Credit request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditRequestResponse'
  /api/v1/credit-requests/export:
    get:
      summary: Export filtered queue as CSV UTF-8
      tags: [runtime]
      responses:
        '200':
          description: Queue export content
  /api/v1/credit-requests/{requestId}:
    get:
      summary: Get credit request detail
      tags: [runtime]
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credit request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditRequestDetailResponse'
  /api/v1/credit-requests/{requestId}/status-transitions:
    post:
      summary: Transition request status
      tags: [runtime]
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusTransitionRequest'
      responses:
        '200':
          description: Updated credit request
components:
  schemas:
    DocumentRef:
      type: object
      required: [documentType, documentNumber]
      example:
        documentType: DNI
        documentNumber: '12345678'
      properties:
        documentType:
          type: string
        documentNumber:
          type: string
    ActorRef:
      type: object
      required: [username]
      example:
        userId: user-analista-001
        username: analista
      properties:
        userId:
          type: string
        username:
          type: string
    ExternalInputSnapshotItem:
      type: object
      required: [sourceType, sourceKey, fieldName, fieldValue]
      example:
        sourceType: user_input
        sourceKey: form:pld
        fieldName: reported_debt
        fieldValue: '400'
      properties:
        sourceType:
          type: string
          enum: [campaign_db, user_input]
        sourceKey:
          type: string
        fieldName:
          type: string
        fieldValue:
          type: string
    LoanConsultationRequest:
      type: object
      required: [document]
      example:
        document:
          documentType: DNI
          documentNumber: '12345678'
      properties:
        document:
          $ref: '#/components/schemas/DocumentRef'
    ProductEvaluationRequest:
      type: object
      required: [workflowCode, document, requestedBy]
      example:
        workflowCode: standard
        document:
          documentType: DNI
          documentNumber: '12345678'
        requestedBy:
          username: analista
        productContext:
          campaign_code: PLD_48M
          validated_income: 2500
          customer_type: CLIENTE
        externalInputs:
          - sourceType: user_input
            sourceKey: form:pld
            fieldName: reported_debt
            fieldValue: '400'
      properties:
        workflowCode:
          type: string
        document:
          $ref: '#/components/schemas/DocumentRef'
        requestedBy:
          $ref: '#/components/schemas/ActorRef'
        productContext:
          type: object
          additionalProperties: true
        externalInputs:
          type: array
          items:
            $ref: '#/components/schemas/ExternalInputSnapshotItem'
        requestedRuleSetVersion:
          type: string
        requestedPipelineVersion:
          type: string
    CreditRequestCreateRequest:
      type: object
      required: [productCode, document, requestedAmount, comment, createdBy]
      example:
        productCode: PLD
        evaluationId: eval-001
        document:
          documentType: DNI
          documentNumber: '12345678'
        campaignCode: PLD_48M
        requestedAmount: 9800
        comment: Solicitud lista para revision
        createdBy:
          username: analista
      properties:
        productCode:
          type: string
        evaluationId:
          type: string
        document:
          $ref: '#/components/schemas/DocumentRef'
        campaignCode:
          type: string
        requestedAmount:
          type: number
        comment:
          type: string
        createdBy:
          $ref: '#/components/schemas/ActorRef'
    StatusTransitionRequest:
      type: object
      required: [targetStatus]
      example:
        targetStatus: en_revision
        comment: Pasa a evaluador
      properties:
        targetStatus:
          type: string
        comment:
          type: string
    CreditRequestResponse:
      type: object
      required: [requestId, productCode, status, document, requestedAmount, comment, createdBy]
      example:
        requestId: req-001
        productCode: PLD
        evaluationId: eval-001
        workflowCode: standard
        status: registrada
        document:
          documentType: DNI
          documentNumber: '12345678'
        campaignCode: PLD_48M
        requestedAmount: 9800
        comment: Solicitud lista para revision
        createdBy:
          username: analista
      properties:
        requestId:
          type: string
        productCode:
          type: string
        evaluationId:
          type: string
        workflowCode:
          type: string
        status:
          type: string
        document:
          $ref: '#/components/schemas/DocumentRef'
        campaignCode:
          type: string
        requestedAmount:
          type: number
        comment:
          type: string
        createdBy:
          $ref: '#/components/schemas/ActorRef'
    CreditRequestDetailResponse:
      allOf:
        - $ref: '#/components/schemas/CreditRequestResponse'
        - type: object
          example:
            requestId: req-001
            productCode: PLD
            evaluationId: eval-001
            workflowCode: standard
            status: en_revision
            document:
              documentType: DNI
              documentNumber: '12345678'
            campaignCode: PLD_48M
            requestedAmount: 9800
            comment: Solicitud lista para revision
            createdBy:
              username: analista
            customerName: Cliente Demo
            createdAt: '2026-06-14T17:30:00Z'
            updatedAt: '2026-06-14T17:32:00Z'
            offeredAmount: 12000
            installmentAmount: 410
            termMonths: 48
            rate: 18.5
            statusHistory:
              - status: registrada
                comment: Alta inicial
                changedBy:
                  username: analista
                changedAt: '2026-06-14T17:30:00Z'
            attachments: []
          properties:
            customerName:
              type: string
            createdAt:
              type: string
            updatedAt:
              type: string
            offeredAmount:
              type: number
            installmentAmount:
              type: number
            termMonths:
              type: integer
            rate:
              type: number
            statusHistory:
              type: array
              items:
                type: object
            attachments:
              type: array
              items:
                type: object
